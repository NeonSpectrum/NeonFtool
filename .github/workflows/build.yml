name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Build and Publish
        run: dotnet publish "NeonFtool/NeonFtool.csproj" -c Release -r win-x64 -p:SelfContained=false -o "dist"

      - name: Prepare Artifact
        shell: pwsh
        run: |
          Move-Item "dist/NeonFtool.exe" "NeonFtool.exe"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonFtool
          path: NeonFtool.exe
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: NeonFtool
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'continuous' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Continuous Build' }}
          body: |
            ${{ startsWith(github.ref, 'refs/tags/v') && 'Official release' || 'Automated pre-release build' }} for commit ${{ github.sha }}.
            ${{ !startsWith(github.ref, 'refs/tags/v') && 'This release is updated on every push to the master branch.' || '' }}
          files: |
            artifacts/NeonFtool.exe
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          make_latest: ${{ startsWith(github.ref, 'refs/tags/v') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
