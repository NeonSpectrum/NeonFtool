name: Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "NeonFtool.sln"

      - name: Build solution
        run: msbuild "NeonFtool.sln" /m /p:Configuration=Release /p:Platform="Any CPU"

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts" | Out-Null
          Compress-Archive -Path "NeonFtool/bin/Release/*" -DestinationPath "artifacts/NeonFtool-Release.zip" -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonFtool-Release
          path: artifacts/NeonFtool-Release.zip
