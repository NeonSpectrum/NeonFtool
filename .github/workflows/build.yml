name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Build and Publish (Framework-Dependent)
        run: dotnet publish "NeonFtool/NeonFtool.csproj" -c Release -r win-x86 --no-self-contained -o "artifacts/dependent"

      - name: Build and Publish (Self-Contained)
        run: dotnet publish "NeonFtool/NeonFtool.csproj" -c Release -r win-x86 --self-contained true -o "artifacts/self-contained"

      - name: Prepare Artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          Copy-Item "artifacts/dependent/NeonFtool.exe" -Destination "dist/NeonFtool.exe"
          Copy-Item "artifacts/self-contained/NeonFtool.exe" -Destination "dist/NeonFtool_SelfContained.exe"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonFtool-Builds
          path: dist/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: NeonFtool-Builds
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NeonFtool.exe
            dist/NeonFtool_SelfContained.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
