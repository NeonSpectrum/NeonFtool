name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore "NeonFtool.sln"

      - name: Publish single-file executable
        run: dotnet publish "NeonFtool/NeonFtool.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o "artifacts/publish"

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/publish/*" -DestinationPath "artifacts/NeonFtool-Release.zip" -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonFtool-Release
          path: artifacts/NeonFtool-Release.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: NeonFtool-Release
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/NeonFtool-Release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
