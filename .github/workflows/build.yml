name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - self_contained: false
            suffix: ""
            name: "Framework-Dependent"
          - self_contained: true
            suffix: "_SelfContained"
            name: "Self-Contained"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Build and Publish (${{ matrix.name }})
        run: dotnet publish "NeonFtool/NeonFtool.csproj" -c Release -r win-x86 --self-contained ${{ matrix.self_contained }} -o "dist"

      - name: Rename Output
        shell: pwsh
        run: |
          if ("${{ matrix.suffix }}" -ne "") {
            Rename-Item "dist/NeonFtool.exe" "NeonFtool${{ matrix.suffix }}.exe"
          } else {
            Move-Item "dist/NeonFtool.exe" "NeonFtool.exe"
          }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonFtool${{ matrix.suffix }}
          path: NeonFtool${{ matrix.suffix }}.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Framework-Dependent artifact
        uses: actions/download-artifact@v4
        with:
          name: NeonFtool
          path: artifacts

      - name: Download Self-Contained artifact
        uses: actions/download-artifact@v4
        with:
          name: NeonFtool_SelfContained
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/NeonFtool.exe
            artifacts/NeonFtool_SelfContained.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
